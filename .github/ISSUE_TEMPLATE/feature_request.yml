name: 功能建议
description: 为这个项目提出一个功能想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间为这个项目提出功能建议！

  - type: dropdown
    id: type
    attributes:
      label: 建议类型
      options:
        - 新功能
        - 改进现有功能
        - 性能优化
        - 文档改进
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景 & 动机
      description: 这个功能请求是否与某个痛点相关？请简要描述
      placeholder: 当 [...] 时，我总是感到困扰...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 清晰简洁地描述你希望实现的功能
      placeholder: 我希望实现 [...]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他替代方案或变通方法
      placeholder: 或者可以实现 [...]
    validations:
      required: true

  - type: textarea
    id: usage
    attributes:
      label: 使用场景
      description: 描述该功能如何被使用，最好附上代码示例或伪代码
      render: python
      placeholder: |
        # 示例代码
        ...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何有助于理解该需求的额外信息或截图
    validations:
      required: true
