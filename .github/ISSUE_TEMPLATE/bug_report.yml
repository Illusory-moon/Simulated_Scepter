name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这份 Bug 报告！

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 Bug 是什么
      placeholder: 发生了一个错误...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 详细描述如何复现这个行为
      placeholder: |
        1. 前往 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 清晰简洁地描述你期望发生的事情
      placeholder: 应该正常显示...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 拖拽或粘贴截图/录屏以帮助解释你的问题
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴与Bug直接相关的日志输出
      render: shell
    validations:
      required: true

  - type: textarea
    id: full_logs
    attributes:
      label: 完整日志
      description: 粘贴完整运行日志（从开始到结束的完整输出）
      render: shell
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你正在使用的操作系统名称和版本
      placeholder: e.g. Windows 11
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python 版本
      description: 你正在使用的 Python 版本
      placeholder: e.g. 3.10
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 项目版本 / Commit
      description: 你正在使用的项目版本或 Git Commit
      placeholder: e.g. v1.0.0 或 abc1234
    validations:
      required: true
